name: Download Telegram Post

on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: 'Telegram post link (e.g., https://t.me/channel/123)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install beautifulsoup4 requests

      - name: Download media and text from Telegram
        run: |
          python download_telegram.py "${{ github.event.inputs.telegram_link }}"

      - name: Commit and push downloaded files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No files downloaded"
          else
            git commit -m "Download from Telegram: ${{ github.event.inputs.telegram_link }}"
            git push
          fi
